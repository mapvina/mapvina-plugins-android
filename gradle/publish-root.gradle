// Use credentials from gradle.properties (local setup)
def resolveUsername() {
    if (project.hasProperty('sonatypeCentralUsername')) return project.property('sonatypeCentralUsername')
    if (project.hasProperty('sonatypeMavenCentralUser')) return project.property('sonatypeMavenCentralUser')
    if (System.getenv('OSSRH_USERNAME')) return System.getenv('OSSRH_USERNAME')
    return ''
}
def resolvePassword() {
    if (project.hasProperty('sonatypeCentralPassword')) return project.property('sonatypeCentralPassword')
    if (project.hasProperty('sonatypeMavenCentralPassword')) return project.property('sonatypeMavenCentralPassword')
    if (System.getenv('OSSRH_PASSWORD')) return System.getenv('OSSRH_PASSWORD')
    return ''
}
ext["ossrhUsername"] = resolveUsername()
ext["ossrhPassword"] = resolvePassword()
ext["sonatypeStagingProfileId"] = System.getenv('SONATYPE_STAGING_PROFILE_ID')
ext["signing.keyId"] = project.hasProperty('signing.keyId') ? project.property('signing.keyId') : System.getenv('SIGNING_KEY_ID')
ext["signing.password"] = project.hasProperty('signing.password') ? project.property('signing.password') : System.getenv('SIGNING_PASSWORD')
ext["signing.secretKeyRingFile"] = project.hasProperty('signing.secretKeyRingFile') ? project.property('signing.secretKeyRingFile') : System.getenv('SIGNING_SECRET_KEY_RING_FILE')
